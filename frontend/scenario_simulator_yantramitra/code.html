<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<title>YantraMitra | Scenario Simulator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
tailwind.config = { darkMode: "class", theme: { extend: { colors: { "on-primary-fixed": "#09006b","on-tertiary": "#ffffff","primary-fixed-dim": "#c1c1ff","secondary-container": "#5efae4","on-background": "#191a28","outline": "#767586","on-primary-container": "#f6f2ff","inverse-on-surface": "#f1efff","on-secondary-fixed": "#00201c","inverse-surface": "#2e2f3e","surface-variant": "#e2e1f4","on-tertiary-fixed": "#291800","on-surface-variant": "#464555","tertiary-container": "#986500","surface": "#fbf8ff","tertiary": "#774f00","on-primary": "#ffffff","secondary-fixed": "#5efae4","on-secondary-fixed-variant": "#005047","surface-tint": "#4948de","on-secondary": "#ffffff","surface-bright": "#fbf8ff","surface-container": "#eeecff","secondary-fixed-dim": "#36ddc8","on-tertiary-container": "#fff2e5","on-secondary-container": "#007165","tertiary-fixed-dim": "#ffba4b","on-primary-fixed-variant": "#2e29c6","error": "#ba1a1a","surface-container-high": "#e8e6fa","surface-container-highest": "#e2e1f4","tertiary-fixed": "#ffddb1","surface-container-low": "#f4f2ff","on-surface": "#191a28","on-error": "#ffffff","secondary": "#006b5f","primary-container": "#5b5bf0","on-error-container": "#93000a","primary": "#413fd6","inverse-primary": "#c1c1ff","surface-dim": "#d9d8ec","error-container": "#ffdad6","surface-container-lowest": "#ffffff","outline-variant": "#c7c4d7","background": "#fbf8ff","primary-fixed": "#e1dfff","on-tertiary-fixed-variant": "#624000" }, borderRadius: { DEFAULT: "0.25rem",lg: "0.5rem",xl: "0.75rem",full: "9999px" }, fontFamily: { "display-hero": ["Geist"],"section-header": ["Geist"],"kpi-numeric": ["Space Grotesk"],"headline-lg": ["Geist"],"body-md": ["Inter"],"headline-lg-mobile": ["Geist"],"label-caps": ["Space Grotesk"] } } } };
</script>
<style>
  body { background: #fbf8ff; overflow: hidden; }
  .glass-panel { background: rgba(255,255,255,0.6); backdrop-filter: blur(16px); border: 1px solid #E7E9F5; box-shadow: 0 8px 32px 0 rgba(65,63,214,0.05); }
  .glass-dark { background: rgba(25,26,40,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(199,196,215,0.2); }
  .shimmer-btn { background: linear-gradient(135deg, #5B5BF0, #7C7CFA); transition: all 0.3s ease; }
  .shimmer-btn:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(65,63,214,0.3); }
  input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
  input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e1dfff; border-radius: 2px; }
  input[type="range"]::-webkit-slider-thumb { height: 14px; width: 14px; border-radius: 50%; background: #413fd6; cursor: pointer; -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 8px rgba(65,63,214,0.3); }
  .kpi-bar { transition: height .4s ease; }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c4d7; border-radius: 10px; }
  .modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(25,26,40,0.36); display: flex; align-items: center; justify-content: center; padding: 18px; }
  .modal-card { width: min(680px, calc(100vw - 32px)); max-height: min(80vh, 680px); overflow-y: auto; border-radius: 18px; border: 1px solid rgba(199,196,215,0.72); background: rgba(255,255,255,0.96); box-shadow: 0 30px 90px rgba(25,26,40,0.28); padding: 20px; }
  .plant-pill { padding: 4px 12px; border-radius: 9999px; font-size: 9px; font-weight: 700; cursor: pointer; transition: all 0.18s ease; border: 1px solid transparent; white-space: nowrap; background: rgba(199,196,215,0.2); color: #464555; }
  .plant-pill:hover { border-color: rgba(65,63,214,0.3); background: rgba(65,63,214,0.06); }
  .plant-pill.active { background: #413fd6; color: #fff; border-color: #413fd6; }
  #ym-three-container canvas { border-radius: 0; }
</style>
</head>
<body class="font-body-md text-on-surface">
<main class="pt-16 h-screen flex overflow-hidden">
  <section class="w-3/5 h-full relative overflow-hidden bg-[#f8f7ff]" id="ym-viewport">
    <div class="absolute inset-0 z-0 flex items-center justify-center" id="ym-scene-loading">
      <div class="flex items-center gap-2 text-on-surface-variant text-sm"><span class="material-symbols-outlined animate-spin text-primary">sync</span> Loading factory floor...</div>
    </div>
    <div id="ym-three-container" class="absolute inset-0 z-[1]"></div>
    <div class="absolute top-3 left-3 flex items-center gap-2 z-10">
      <div class="glass-dark px-2.5 py-1 rounded-lg flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full" id="ym-sim-indicator"></span>
        <span class="font-label-caps text-white/80 text-[9px]" id="ym-sim-status">READY</span>
        <span class="w-px h-2.5 bg-white/20 mx-0.5"></span>
        <span class="font-kpi-numeric text-white/60 text-[10px]" id="ym-iteration">#0</span>
      </div>
      <div class="glass-dark px-2 py-1 rounded-lg flex items-center gap-1" id="ym-plant-badge">
        <span class="material-symbols-outlined text-white/50 text-sm">factory</span>
        <span class="text-white/80 text-[11px] font-semibold" id="ym-plant-name">Loading...</span>
      </div>
    </div>
    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-10 flex items-center gap-1.5">
      <div class="glass-dark p-1 rounded-full flex gap-1 shadow-lg">
        <button class="px-2.5 py-1.5 rounded-full bg-primary text-white font-label-caps text-[9px] flex items-center gap-1 hover:opacity-90 transition-all" id="ym-sim-run"><span class="material-symbols-outlined text-sm">play_arrow</span>RUN</button>
        <button class="px-2.5 py-1.5 rounded-full text-white/60 font-label-caps text-[9px] flex items-center gap-1 hover:bg-white/10 transition-all" id="ym-sim-pause"><span class="material-symbols-outlined text-sm">pause</span>PAUSE</button>
        <button class="px-2.5 py-1.5 rounded-full text-white/60 font-label-caps text-[9px] flex items-center gap-1 hover:bg-white/10 transition-all" id="ym-sim-reset"><span class="material-symbols-outlined text-sm">restart_alt</span>RESET</button>
        <button class="px-2.5 py-1.5 rounded-full text-white/60 font-label-caps text-[9px] flex items-center gap-1 hover:bg-white/10 transition-all" id="ym-sim-compare"><span class="material-symbols-outlined text-sm">compare_arrows</span>BASELINE</button>
        <button class="px-2.5 py-1.5 rounded-full text-white/60 font-label-caps text-[9px] flex items-center gap-1 hover:bg-white/10 transition-all" id="ym-sim-export"><span class="material-symbols-outlined text-sm">download</span>CSV</button>
        <button class="px-2.5 py-1.5 rounded-full text-white/60 font-label-caps text-[9px] flex items-center gap-1 hover:bg-white/10 transition-all" id="ym-sim-history"><span class="material-symbols-outlined text-sm">history</span>LOG</button>
      </div>
    </div>
    <div id="ym-machine-detail" class="absolute right-2 bottom-16 w-[300px] max-h-[360px] z-20 glass-dark rounded-xl p-3 overflow-y-auto custom-scrollbar hidden"></div>
  </section>
  <section class="w-2/5 h-full flex flex-col overflow-y-auto custom-scrollbar bg-white/40 border-l border-outline-variant/30">
    <div class="p-4 pb-1 flex items-center justify-between">
      <div>
        <h2 class="font-section-header text-section-header text-on-surface leading-tight">Scenario Simulator</h2>
        <p class="text-on-surface-variant text-[10px] mt-0.5">Adjust parameters to forecast production</p>
      </div>
    </div>
    <div class="px-4 pb-2 overflow-x-auto no-scrollbar" id="ym-plant-pills"></div>
    <div class="px-4 pb-2 space-y-2" id="ym-sliders">
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Production Speed</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-speed">85%</span></div><input type="range" min="0" max="100" value="85" data-slider="speed"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Maintenance Delay</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-delay">12h</span></div><input type="range" min="0" max="72" value="12" data-slider="delay"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Power Load</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-power">420 kW</span></div><input type="range" min="100" max="1000" value="420" data-slider="power"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Quality Target</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-quality">98%</span></div><input type="range" min="80" max="100" value="98" data-slider="quality"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Operator Count</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-operators">12</span></div><input type="range" min="2" max="30" value="12" data-slider="operators"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Raw Material</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-material">85%</span></div><input type="range" min="0" max="100" value="85" data-slider="material"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Temperature</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-temp">32°C</span></div><input type="range" min="10" max="50" value="32" data-slider="temp"/></div>
      <div><div class="flex justify-between items-center mb-0.5"><label class="font-label-caps text-on-surface text-[10px]">Energy Cost</label><span class="font-kpi-numeric text-primary text-[11px]" id="slider-energy">₹6.5/kWh</span></div><input type="range" min="2" max="15" value="65" data-slider="energy"/></div>
    </div>
    <div class="px-4 pb-2">
      <div class="flex items-center justify-between mb-1.5"><h3 class="font-label-caps text-on-surface-variant text-[9px] uppercase tracking-wider">Projected KPIs</h3><span class="text-[8px] text-on-surface-variant font-medium" id="ym-kpi-iteration">iteration #0</span></div>
      <div class="grid grid-cols-3 gap-1.5" id="ym-charts-grid"></div>
    </div>
    <div class="px-4 pb-4 mt-auto">
      <div id="ym-ai-prediction" class="p-3 rounded-xl bg-gradient-to-br from-primary to-primary/90 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-20 h-20 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
        <div class="relative z-10">
          <div class="flex items-center gap-1.5 mb-1"><span class="material-symbols-outlined text-white text-sm">auto_awesome</span><span class="font-label-caps text-white/80 text-[9px]">AI Prediction</span></div>
          <div id="ym-prediction-text"><p class="text-white/70 text-[11px]">Adjust parameters and run to generate AI prediction.</p></div>
        </div>
      </div>
    </div>
  </section>
</main>
<div id="ym-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-panel rounded-full py-2.5 px-5 flex items-center gap-2.5 translate-y-32 opacity-0 transition-all duration-500 z-[100] shadow-lg">
<span class="material-symbols-outlined text-secondary text-sm">check_circle</span>
<span class="font-bold text-sm text-on-surface" id="ym-toast-msg"></span>
</div>
<script src="/js/ym_factory_3d.js"></script>
<script src="/js/scenario_simulator_yantramitra.js" defer></script>
<script src="/js/app_shell_yantramitra.js" defer></script>
</body></html>
